name: Daily Anthropic Job Watcher

on:
  schedule:
    # 21:00 UTC = 5:00pm EDT (daylight saving, roughly Mar-Nov)
    # 22:00 UTC = 5:00pm EST (standard time, roughly Nov-Mar)
    # GitHub Actions cron doesn't understand DST, so both are scheduled;
    # the script runs twice a year "off by an hour" during the transition
    # weeks, which is harmless (worst case: one extra/missed hour of lead time).
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab to test

permissions:
  contents: write  # needed to commit the updated state.json back to the repo

jobs:
  check-roles:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: mkapadia99@gmail.com
        run: python check_roles.py

      - name: Commit updated state
        run: |
          git config --global user.name "job-watcher-bot"
          git config --global user.email "actions@github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update role state [skip ci]"
          git push
