name: Daily Anthropic Job Watcher

  on:
  schedule:
    - cron: "0 21 */2 * *"
    - cron: "0 22 */2 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-roles:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: mkapadia99@gmail.com
        run: python check_roles.py

      - name: Commit updated state
        run: |
          git config --global user.name "job-watcher-bot"
          git config --global user.email "actions@github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update role state [skip ci]"
          git push
